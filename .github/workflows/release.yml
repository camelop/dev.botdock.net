name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (for manual runs)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + tags so the release-body step can compute
          # $PREV_TAG and git log between tags.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp version
        run: |
          cat > src/version.ts <<EOF
          // Stamped by the release workflow at build time.
          export const BOTDOCK_VERSION = "${{ steps.version.outputs.version }}";
          EOF

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run web:build

      - name: Embed frontend
        run: bun scripts/embed-dist.ts

      - name: Cross-compile binaries
        run: |
          mkdir -p dist-bin
          for entry in \
            "bun-linux-x64:botdock-linux-x64" \
            "bun-linux-arm64:botdock-linux-arm64" \
            "bun-darwin-x64:botdock-darwin-x64" \
            "bun-darwin-arm64:botdock-darwin-arm64"; do
            target="${entry%%:*}"
            outname="${entry##*:}"
            echo ">> $outname ($target)"
            bun build \
              --compile --minify \
              --target="$target" \
              --outfile "dist-bin/$outname" \
              src/cli.ts
          done
          ls -lh dist-bin/

      - name: Checksums
        working-directory: dist-bin
        run: sha256sum botdock-* > SHA256SUMS

      - name: Build release body
        id: release_body
        run: |
          # Release body = curated CHANGELOG.md section + full commit
          # messages (subject + body) for every non-merge commit since the
          # previous tag. The in-app update popover (that calls
          # /releases/latest) shows whichever the user reads first — the
          # CHANGELOG line is the elevator pitch, the commit list has the
          # actual "why" and implementation notes for power users.
          TAG="${{ steps.version.outputs.tag }}"
          git fetch --tags --force || true

          # CHANGELOG section.
          awk -v tag="$TAG" '
            BEGIN { printing = 0 }
            $0 ~ "^## +" tag "( |$)" { printing = 1; next }
            printing && $0 ~ /^## +v?[0-9]/ { exit }
            printing { print }
          ' CHANGELOG.md > release-body.md || true

          # Commit messages since previous tag.
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..$TAG"
          else
            RANGE="$TAG"
          fi
          {
            echo ""
            echo "---"
            echo ""
            echo "## Commits"
            echo ""
            # %s = subject, %b = body. Prefix each subject with "### " so
            # the body flows as markdown underneath.
            git log --no-merges --format="### %s%n%n%b" "$RANGE"
          } >> release-body.md

          echo "--- release body preview ---"
          head -60 release-body.md || true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release-body.md
          files: |
            dist-bin/botdock-linux-x64
            dist-bin/botdock-linux-arm64
            dist-bin/botdock-darwin-x64
            dist-bin/botdock-darwin-arm64
            dist-bin/SHA256SUMS
